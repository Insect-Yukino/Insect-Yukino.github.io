{{ define "title" }}{{ .Title }}{{ with .Site.Title }} | {{ . }}{{ end }}{{ end }}
{{ define "main" }}

<style>
header,
footer,
.site-header,
.site-footer,
.page-header,
.hero {
  display: none !important;
}

body {
  margin: 0;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  color: #2a3441;
  scrollbar-gutter: stable both-edges;
}

*, *::before, *::after {
  box-sizing: border-box;
}

main[role="main"] {
  padding-bottom: 0 !important;
}

.post-bg {
  position: fixed;
  inset: 0;
  z-index: -1;
  background-size: cover;
  background-position: center;
}

.post-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      180deg,
      rgba(32, 41, 55, 0.28) 0%,
      rgba(40, 50, 65, 0.42) 100%
    );
}

.page-shell {
  display: flex;
  justify-content: center;
  padding: 0 20px 132px;
}

.post-card {
  width: 100%;
  max-width: 860px;
  overflow: clip;
  padding: 52px 56px;
  border-radius: 18px;
  background:
    linear-gradient(
      to bottom,
      rgba(245, 248, 252, 0.92),
      rgba(238, 242, 248, 0.9)
    );
  box-shadow:
    inset 0 0 0 1px rgba(210, 220, 235, 0.44),
    0 12px 30px rgba(20, 28, 38, 0.12);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.post-title {
  margin: 0 0 14px;
  color: #2a3441;
  font-size: 31px;
  font-weight: 300;
  letter-spacing: 0.02em;
  line-height: 1.35;
}

.post-date {
  margin-bottom: 34px;
  font-size: 14px;
  color: #7a8796;
}

.post-content {
  font-size: 17px;
  font-weight: 350;
  letter-spacing: 0.015em;
  line-height: 1.68;
  color: #2a3441;
}

.post-content > *:first-child {
  margin-top: 0;
}

.post-content > *:last-child {
  margin-bottom: 0;
}

.post-content p,
.post-content ul,
.post-content ol,
.post-content blockquote,
.post-content pre,
.post-content table,
.post-content .highlight,
.post-content hr {
  margin: 0 0 1.45em;
}

.post-content h2,
.post-content h3,
.post-content h4,
.post-content h5,
.post-content h6 {
  margin: 1.9em 0 0.75em;
  color: #1f2d3d;
  line-height: 1.38;
}

.post-content h2 {
  font-size: 28px;
  font-weight: 400;
}

.post-content h3 {
  font-size: 23px;
  font-weight: 400;
}

.post-content h4 {
  font-size: 19px;
  font-weight: 500;
}

.post-content h5 {
  font-size: 17px;
  font-weight: 600;
}

.post-content h6 {
  font-size: 16px;
  font-weight: 600;
  color: #415269;
}

.post-content a {
  color: #3368ab;
  text-underline-offset: 0.18em;
}

.post-content strong {
  font-weight: 600;
}

.post-content em {
  color: #415269;
}

.post-content ul,
.post-content ol {
  padding-left: 1.45em;
}

.post-content li {
  margin: 0.38em 0;
}

.post-content li > ul,
.post-content li > ol {
  margin-top: 0.5em;
  margin-bottom: 0;
}

.post-content :not(pre) > code {
  display: inline-block;
  padding: 0.14em 0.48em;
  border-radius: 0.45em;
  background: rgba(220, 228, 236, 0.92);
  color: #2b5fad;
  font-size: 0.92em;
  word-break: break-word;
}

.post-content pre {
  padding: 0;
  background: transparent;
}

.post-content .highlight {
  position: relative;
  overflow: hidden;
}

.post-content .highlight pre {
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}

.post-content pre code {
  min-width: max-content;
  white-space: pre;
}

.post-content blockquote {
  padding: 18px 22px;
  border-left: 4px solid rgba(120, 150, 190, 0.55);
  border-radius: 12px;
  background: rgba(232, 238, 245, 0.72);
  color: #3a4656;
}

.post-content blockquote > *:last-child {
  margin-bottom: 0;
}

.post-content blockquote::before {
  content: none !important;
}

.post-content table {
  display: table;
  width: auto;
  max-width: 100%;
  border-collapse: collapse;
  border-spacing: 0;
  border-radius: 16px;
  background: rgba(246, 249, 252, 0.92);
  box-shadow: inset 0 0 0 1px rgba(212, 220, 229, 0.82);
}

.post-content thead {
  background: rgba(222, 231, 240, 0.82);
}

.post-content th,
.post-content td {
  padding: 12px 16px;
  border: 1px solid rgba(214, 222, 232, 0.82);
  text-align: left;
  vertical-align: top;
  white-space: nowrap;
}

.post-content img {
  display: block;
  max-width: 100%;
  height: auto;
  margin: 1.8rem auto;
  border-radius: 16px;
  box-shadow: 0 12px 26px rgba(35, 46, 62, 0.12);
}

.post-content hr {
  border: 0;
  border-top: 1px solid rgba(170, 184, 201, 0.45);
}

.snow {
  position: fixed;
  top: -10px;
  width: 2px;
  height: 2px;
  background: rgba(255, 255, 255, 0.72);
  border-radius: 50%;
  pointer-events: none;
  animation: snow-fall linear infinite;
}

@keyframes snow-fall {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}

@media (max-width: 768px) {
  .page-shell {
    padding: 0 12px 88px;
  }

  .post-card {
    padding: 30px 22px;
    border-radius: 16px;
  }

  .post-title {
    font-size: 25px;
    margin-bottom: 10px;
  }

  .post-date {
    margin-bottom: 24px;
    font-size: 13px;
  }

  .post-content {
    font-size: 16px;
    line-height: 1.64;
    letter-spacing: 0.01em;
  }

  .post-content h2 {
    font-size: 24px;
  }

  .post-content h3 {
    font-size: 20px;
  }

  .post-content h4 {
    font-size: 18px;
  }

  .post-content h5 {
    font-size: 16px;
  }

  .post-content h6 {
    font-size: 15px;
  }

  .post-content blockquote {
    padding: 16px 18px;
  }

  .post-content th,
  .post-content td {
    padding: 10px 12px;
  }
}
</style>

<div class="post-bg" id="postBg"></div>

<section class="page-shell">
  <article class="post-card">
    <h1 class="post-title">{{ .Title }}</h1>

    {{ with .Date }}
      <div class="post-date">{{ .Format "January 2, 2006" }}</div>
    {{ end }}

    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
</section>

<script>
(function () {
  const imgs = [
    "/images/background-image/background-img1.jpg",
    "/images/background-image/background-img2.jpg",
    "/images/background-image/background-img3.jpg",
    "/images/background-image/background-img4.jpg",
    "/images/background-image/background-img5.jpg",
    "/images/background-image/background-img6.jpg",
    "/images/background-image/background-img7.jpg",
    "/images/background-image/background-img8.jpg",
    "/images/background-image/background-img9.jpg",
    "/images/background-image/background-img10.jpg"
  ];

  const postBg = document.getElementById("postBg");
  postBg.style.backgroundImage =
    `url('${imgs[Math.floor(Math.random() * imgs.length)]}')`;
})();

for (let i = 0; i < 22; i++) {
  const snow = document.createElement("div");
  snow.className = "snow";
  snow.style.left = Math.random() * 100 + "vw";
  snow.style.animationDuration = 14 + Math.random() * 12 + "s";
  snow.style.opacity = 0.4 + Math.random() * 0.5;
  document.body.appendChild(snow);
}
</script>

{{ end }}
